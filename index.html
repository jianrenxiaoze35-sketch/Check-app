<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Check</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f5; }
.scr { display: none; }
.scr.on { display: flex; flex-direction: column; min-height: 100vh; }
.hdr { background: #fff; padding: 12px 16px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 10px; }
.hdr-back { width: 32px; height: 32px; border: none; background: #f5f5f5; border-radius: 8px; cursor: pointer; }
.hdr-title { flex: 1; font-weight: 500; }
.content { flex: 1; overflow-y: auto; padding: 16px; }
.btn { padding: 12px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; width: 100%; }
.btn-primary { background: #0F6E56; color: #fff; }
.btn-secondary { background: #534AB7; color: #fff; }
.btn-text { background: none; color: #0066cc; border: none; padding: 8px; font-size: 12px; }
.btn-del { background: #fee; color: #c33; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }
.btn:disabled { background: #ddd; color: #999; cursor: not-allowed; }
.input { width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; margin-bottom: 8px; }
.card { background: #fff; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 8px; }
.checkbox-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; align-items: flex-start; }
.checkbox-item:last-child { border-bottom: none; }
.checkbox-item input { width: 20px; height: 20px; margin-top: 2px; }
.checkbox-item label { flex: 1; cursor: pointer; }
.note { font-size: 11px; color: #0F6E56; margin-top: 4px; }
.progress { width: 100%; height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden; margin: 8px 0; }
.progress-bar { height: 100%; background: #0F6E56; }
.staff-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
.staff-item:last-child { border-bottom: none; }
.warning { background: #fee; border: 1px solid #f7c1c1; border-radius: 8px; padding: 10px; color: #c33; font-size: 12px; margin-bottom: 12px; }

/* サマリーカード専用スタイル */
.summary-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
.summary-header { padding: 10px 12px; cursor: pointer; user-select: none; display: flex; justify-content: space-between; align-items: center; }
.summary-header:hover { background: #f8f9fa; }
.summary-header-left { display: flex; align-items: center; gap: 8px; }
.summary-title { font-weight: 600; font-size: 14px; }
.summary-badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: 500; }
.summary-badge.good { background: #e8f5e9; color: #0F6E56; }
.summary-badge.warn { background: #fff3e0; color: #e65100; }
.summary-badge.empty { background: #f5f5f5; color: #999; }
.summary-chevron { font-size: 12px; color: #999; transition: transform 0.2s; }
.summary-chevron.open { transform: rotate(180deg); }
.summary-body { border-top: 1px solid #f0f0f0; display: none; }
.summary-body.open { display: block; }
.summary-progress { padding: 8px 12px; }
.summary-progress-label { display: flex; justify-content: space-between; font-size: 11px; color: #666; margin-bottom: 4px; }
.progress-enhanced { width: 100%; height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
.progress-enhanced-bar { height: 100%; border-radius: 3px; transition: width 0.3s; }
.progress-enhanced-bar.good { background: #0F6E56; }
.progress-enhanced-bar.warn { background: #ff9800; }
.progress-enhanced-bar.poor { background: #f44336; }
.summary-items { padding: 8px 12px; }
.summary-items-title { font-size: 11px; color: #999; font-weight: 500; margin-bottom: 6px; }
.item-grid { display: flex; flex-wrap: wrap; gap: 4px; }
.item-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 4px; font-size: 11px; }
.item-badge.done { background: #e8f5e9; color: #0F6E56; }
.item-badge.undone { background: #fce8e6; color: #c5221f; }
.summary-staff { padding: 6px 12px; font-size: 12px; color: #666; border-top: 1px solid #f5f5f5; }
.summary-links { padding: 8px 12px; display: flex; gap: 8px; }
.notion-link { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 4px; text-decoration: none; font-size: 11px; color: #555; }
.notion-link:hover { background: #ebebeb; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="scr on">
  <div class="hdr"><h1 class="hdr-title">Daily Check</h1></div>
  <div class="content">
    <div style="padding: 16px 0 12px; text-align: center;">
      <div style="font-size: 32px; margin-bottom: 6px;">📋</div>
      <h2 style="font-size: 18px;">Daily Check</h2>
      <div id="home-date" style="font-size: 12px; color: #999; margin-top: 4px;"></div>
    </div>

    <!-- 開店前サマリー -->
    <div class="summary-card">
      <div class="summary-header" onclick="toggleSummary('opening')">
        <div class="summary-header-left">
          <span>🌅</span>
          <span class="summary-title">開店前チェック</span>
          <span class="summary-badge empty" id="opening-badge">読込中</span>
        </div>
        <span class="summary-chevron" id="opening-chevron">▼</span>
      </div>
      <div class="summary-body" id="opening-body">
        <div style="padding: 12px; color: #999; font-size: 13px;">読み込み中...</div>
      </div>
    </div>

    <!-- 締め作業サマリー -->
    <div class="summary-card">
      <div class="summary-header" onclick="toggleSummary('closing')">
        <div class="summary-header-left">
          <span>🌙</span>
          <span class="summary-title">締め作業チェック</span>
          <span class="summary-badge empty" id="closing-badge">読込中</span>
        </div>
        <span class="summary-chevron" id="closing-chevron">▼</span>
      </div>
      <div class="summary-body" id="closing-body">
        <div style="padding: 12px; color: #999; font-size: 13px;">読み込み中...</div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="startMode('opening')" style="margin-bottom: 8px;">🌅 開店前チェック</button>
    <button class="btn btn-secondary" onclick="startMode('closing')" style="margin-bottom: 8px;">🌙 締め作業チェック</button>
    <button class="btn-text" onclick="showScr('staff-mgr')" style="width: 100%; text-align: center;">👥 スタッフ管理</button>
  </div>
</div>

<!-- STAFF MANAGER -->
<div id="staff-mgr" class="scr">
  <div class="hdr">
    <button class="hdr-back" onclick="showScr('home')">←</button>
    <h1 class="hdr-title">スタッフ管理</h1>
  </div>
  <div class="content">
    <div style="margin-bottom: 16px;">
      <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">新規追加</label>
      <div style="display: flex; gap: 8px;">
        <input type="text" id="staff-add-input" class="input" placeholder="名前" style="flex: 1; margin-bottom: 0;">
        <button class="btn" style="flex: 0; background: #0F6E56; color: #fff; padding: 10px;" onclick="addStaff()">追加</button>
      </div>
    </div>
    <div style="font-size: 12px; color: #666; margin-bottom: 8px; font-weight: 500;">登録済みスタッフ</div>
    <div id="staff-list"></div>
  </div>
</div>

<!-- STAFF SELECT -->
<div id="staff" class="scr">
  <div class="hdr">
    <button class="hdr-back" onclick="showScr('home')">←</button>
    <h1 class="hdr-title" id="staff-title">記入者選択</h1>
  </div>
  <div class="content">
    <div id="staff-warn" class="warning" style="display: none;"></div>
    <div style="margin-bottom: 16px;">
      <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">スタッフ名</label>
      <input type="text" id="staff-input" class="input" placeholder="名前を入力">
      <div id="staff-err" style="color: #c33; font-size: 12px; display: none;">スタッフ名を入力してください</div>
    </div>
    <button class="btn btn-primary" onclick="toCheck()">チェック開始</button>
  </div>
</div>

<!-- CHECK -->
<div id="check" class="scr">
  <div class="hdr">
    <button class="hdr-back" onclick="showScr('staff')">←</button>
    <h1 class="hdr-title" id="check-title">チェック入力</h1>
  </div>
  <div class="content">
    <div style="margin-bottom: 12px;">
      <span id="check-staff" style="font-weight: 500;"></span> - 
      <span id="check-mode" style="color: #666;"></span>
    </div>
    <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
    <div style="font-size: 12px; color: #666; margin-bottom: 16px;"><span id="check-count"></span></div>
    <div id="check-items"></div>
  </div>
  <div style="padding: 12px; border-top: 1px solid #e0e0e0;">
    <button class="btn btn-primary" onclick="toConfirm()">確認へ</button>
  </div>
</div>

<!-- CONFIRM -->
<div id="confirm" class="scr">
  <div class="hdr">
    <button class="hdr-back" onclick="showScr('check')">←</button>
    <h1 class="hdr-title">確認</h1>
  </div>
  <div class="content">
    <div class="card">
      <div style="font-size: 12px; color: #666; margin-bottom: 4px;">記入者</div>
      <div style="font-weight: 500;" id="confirm-staff"></div>
    </div>
    <div class="card">
      <div style="font-size: 12px; color: #666; margin-bottom: 4px;">種別</div>
      <div style="font-weight: 500;" id="confirm-mode"></div>
    </div>
    <div class="card">
      <div style="font-size: 12px; color: #666; margin-bottom: 4px;">完了率</div>
      <div style="font-weight: 500;" id="confirm-rate"></div>
    </div>
  </div>
  <div style="padding: 12px; border-top: 1px solid #e0e0e0;">
    <button class="btn btn-primary" id="send-btn" onclick="send()">Notionに記録</button>
  </div>
</div>

<!-- DONE -->
<div id="done" class="scr">
  <div class="content" style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <div style="font-size: 48px; margin-bottom: 12px;">✅</div>
    <h2 style="font-size: 18px; margin-bottom: 8px;">記録しました</h2>
    <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Notionに送信されました</p>
    <button class="btn btn-primary" onclick="goHome()" style="max-width: 200px;">ホームに戻る</button>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbx1HFdaD6webHg9xrCgiGcEVMj_1NfN_vBqGwHfZ-Rwu0fdFxiFcupKfHWI7Fbli2AqOA/exec";
const STORAGE_KEY = "daily-check-staffs";

// ★★★ Notion DB のブラウザ閲覧URL（要設定）★★★
const NOTION_DB_URL = {
  opening: "https://www.notion.so/73ff570b9c2a4351b19df2b5451e79bd",
  closing: "https://www.notion.so/305fa1bec3b94f8483b1adc0688c27c2",
};

let currentMode = null;
let staff = "";
let checks = {};
let staffs = [];
let checkItems = { opening: [], closing: [] };
let notionRecords = [];
let summaryOpen = { opening: false, closing: false };

// ============================================================
//  画面制御・日付表示
// ============================================================
function showScr(id) {
  document.querySelectorAll(".scr").forEach(s => s.classList.remove("on"));
  document.getElementById(id).classList.add("on");
}

function toggleSummary(mode) {
  summaryOpen[mode] = !summaryOpen[mode];
  const body = document.getElementById(mode + "-body");
  const chevron = document.getElementById(mode + "-chevron");
  
  if (summaryOpen[mode]) {
    body.classList.add("open");
    chevron.classList.add("open");
  } else {
    body.classList.remove("open");
    chevron.classList.remove("open");
  }
}

function renderDate() {
  const now = new Date();
  const days = ["日", "月", "火", "水", "木", "金", "土"];
  const dateStr = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日（${days[now.getDay()]}）`;
  document.getElementById("home-date").textContent = dateStr;
}

// ============================================================
//  スタッフ管理
// ============================================================
function loadStaffs() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    staffs = saved ? JSON.parse(saved) : [];
  } catch (e) { staffs = []; }
  renderStaffList();
}

function saveStaffs() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(staffs));
}

function addStaff() {
  const inp = document.getElementById("staff-add-input");
  const name = inp.value.trim();
  if (!name) return;
  if (staffs.includes(name)) { alert("既に登録されています"); return; }
  staffs.push(name);
  saveStaffs();
  inp.value = "";
  renderStaffList();
}

function delStaff(name) {
  staffs = staffs.filter(s => s !== name);
  saveStaffs();
  renderStaffList();
}

function renderStaffList() {
  const html = staffs.map(s => `
    <div class="staff-item">
      <span style="flex: 1;">${s}</span>
      <button class="btn-del" onclick="delStaff('${s}')">削除</button>
    </div>
  `).join("");
  document.getElementById("staff-list").innerHTML = html || "<div style='color: #999; font-size: 12px;'>登録済みスタッフなし</div>";
}

// ============================================================
//  チェック項目・記録取得
// ============================================================
async function loadCheckItems(mode) {
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action: "getCheckItems", mode: mode })
    });
    const data = await res.json();
    if (data.ok) {
      checkItems[mode] = data.items || [];
      updateSummary(); // 項目取得後にサマリー更新
    }
  } catch (err) { console.log("Load items error:", err); }
}

async function loadTodayRecords() {
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action: "fetchTodayRecords" })
    });
    const data = await res.json();
    if (data.ok && data.data) {
      notionRecords = [...(data.data.opening || []), ...(data.data.closing || [])];
      updateSummary();
    }
  } catch (err) { console.log("Load error:", err); }
}

// ============================================================
//  サマリー表示
// ============================================================
function updateSummary() {
  renderModeSummary("opening");
  renderModeSummary("closing");
}

function renderModeSummary(mode) {
  const badge = document.getElementById(mode + "-badge");
  const body = document.getElementById(mode + "-body");
  const records = notionRecords.filter(r => r.mode === mode);
  const items = checkItems[mode] || [];

  if (items.length === 0) {
    badge.textContent = "項目取得中";
    badge.className = "summary-badge empty";
    body.innerHTML = "<div style='padding: 12px; color: #999;'>項目を読み込み中...</div>";
    return;
  }

  if (records.length === 0) {
    badge.textContent = "記録なし";
    badge.className = "summary-badge empty";
    body.innerHTML = renderEmptyBody(mode);
    return;
  }

  // 達成率計算
  let totalCompleted = 0, totalItems = 0;
  records.forEach(r => {
    totalCompleted += r.checks.completed;
    totalItems += r.checks.total;
  });
  const rate = totalItems > 0 ? Math.round((totalCompleted / totalItems) * 100) : 0;

  // バッジ更新
  badge.textContent = `${records.length}件 / ${rate}%`;
  badge.className = `summary-badge ${rate >= 80 ? 'good' : 'warn'}`;

  // ボディ更新
  body.innerHTML = renderSummaryBody(mode, records, items, rate, totalCompleted, totalItems);
}

function renderEmptyBody(mode) {
  const dbUrl = NOTION_DB_URL[mode];
  return `
    <div style="padding: 12px; color: #999; font-size: 13px;">本日の記録はまだありません</div>
    <div class="summary-links">
      <a href="${dbUrl}" target="_blank" class="notion-link">
        <span>🔗</span> Notionで開く
      </a>
    </div>
  `;
}

function renderSummaryBody(mode, records, items, rate, totalCompleted, totalItems) {
  const dbUrl = NOTION_DB_URL[mode];

  // プログレスバー色分け
  const progressClass = rate >= 80 ? 'good' : rate >= 60 ? 'warn' : 'poor';

  // スタッフ一覧
  const staffList = [...new Set(records.map(r => r.staff))].join(", ");

  // 項目別完了状況
  const itemStatusMap = {};
  items.forEach(item => {
    const completedByAnyone = records.some(r => r.checks?.items?.[item.label]);
    itemStatusMap[item.label] = completedByAnyone;
  });

  const itemBadges = items.map(item => {
    const isCompleted = itemStatusMap[item.label];
    return `<span class="item-badge ${isCompleted ? 'done' : 'undone'}">
      ${isCompleted ? '✅' : '❌'} ${item.label}
    </span>`;
  }).join("");

  return `
    <div class="summary-progress">
      <div class="summary-progress-label">
        <span>達成率</span>
        <span>${totalCompleted}/${totalItems} (${rate}%)</span>
      </div>
      <div class="progress-enhanced">
        <div class="progress-enhanced-bar ${progressClass}" style="width: ${rate}%;"></div>
      </div>
    </div>

    <div class="summary-items">
      <div class="summary-items-title">項目別状況</div>
      <div class="item-grid">${itemBadges}</div>
    </div>

    <div class="summary-staff">
      👥 担当者: ${staffList} (${records.length}件)
    </div>

    <div class="summary-links">
      <a href="${dbUrl}" target="_blank" class="notion-link">
        <span>🔗</span> Notionで開く
      </a>
    </div>
  `;
}

// ============================================================
//  チェック処理（既存機能）
// ============================================================
function startMode(m) {
  currentMode = m;
  checks = {};
  staff = "";
  document.getElementById("staff-title").textContent = (m === "opening" ? "🌅 開店前" : "🌙 締め作業");
  document.getElementById("staff-input").value = "";
  document.getElementById("staff-err").style.display = "none";
  document.getElementById("staff-warn").style.display = "none";
  showScr("staff");
}

function toCheck() {
  const inp = document.getElementById("staff-input");
  const name = inp.value.trim();
  if (!name) { document.getElementById("staff-err").style.display = "block"; return; }

  const alreadyChecked = notionRecords.find(r => r.staff === name && r.mode === currentMode);
  if (alreadyChecked) {
    document.getElementById("staff-warn").innerHTML = 
      `⚠️ <strong>${name}</strong>さんは既に${currentMode === "opening" ? "開店前" : "締め作業"}をチェック済みです。本当に記入しますか？`;
    document.getElementById("staff-warn").style.display = "block";
  }

  staff = name;
  document.getElementById("check-staff").textContent = staff;
  document.getElementById("check-mode").textContent = (currentMode === "opening" ? "開店前" : "締め作業");

  const items = checkItems[currentMode] || [];
  const html = items.map(item => {
    const alreadyDone = notionRecords.find(r => r.mode === currentMode && r.checks?.items?.[item.label]);
    return `
      <div class="checkbox-item">
        <input type="checkbox" id="${item.id}" onchange="updateProgress()">
        <label for="${item.id}">
          <div style="font-weight: 500; font-size: 14px;">${item.label}</div>
          ${alreadyDone ? `<div class="note">✅ 既に記入済み</div>` : ""}
        </label>
      </div>
    `;
  }).join("");
  document.getElementById("check-items").innerHTML = html;
  updateProgress();
  showScr("check");
}

function updateProgress() {
  const items = checkItems[currentMode] || [];
  const checked = Array.from(document.querySelectorAll("#check-items input:checked")).length;
  const total = items.length;
  document.getElementById("progress-bar").style.width = (total > 0 ? checked / total * 100 : 0) + "%";
  document.getElementById("check-count").textContent = checked + "/" + total;
  
  checks = {};
  document.querySelectorAll("#check-items input").forEach(el => {
    if (el.checked) {
      const label = el.parentElement.querySelector("label div").textContent.trim();
      checks[label] = true;
    }
  });
}

function toConfirm() {
  const items = checkItems[currentMode] || [];
  const checked = Object.keys(checks).length;
  const total = items.length;
  const rate = total > 0 ? Math.round(checked / total * 100) : 0;
  
  document.getElementById("confirm-staff").textContent = staff;
  document.getElementById("confirm-mode").textContent = (currentMode === "opening" ? "🌅 開店前" : "🌙 締め作業");
  document.getElementById("confirm-rate").textContent = checked + "/" + total + " (" + rate + "%)";
  showScr("confirm");
}

async function send() {
  document.getElementById("send-btn").disabled = true;
  document.getElementById("send-btn").textContent = "送信中...";
  
  const today = new Date().toISOString().split("T")[0];
  const payload = { mode: currentMode, date: today, staff: staff, status: "✅ 完了", checks: checks };
  
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    
    if (data.ok) {
      showScr("done");
      await loadTodayRecords(); // 送信後にサマリー更新
    } else {
      alert("エラー: " + data.error);
    }
  } catch (err) {
    alert("送信失敗: " + err.message);
  }
  
  document.getElementById("send-btn").disabled = false;
  document.getElementById("send-btn").textContent = "Notionに記録";
}

function goHome() {
  showScr("home");
  loadTodayRecords();
}

// ============================================================
//  初期化
// ============================================================
document.addEventListener("DOMContentLoaded", () => {
  renderDate();
  loadStaffs();
  loadCheckItems("opening");
  loadCheckItems("closing");
  loadTodayRecords();
  setInterval(loadTodayRecords, 8000); // 8秒間隔で自動更新
});
</script>
</body>
</html>
