<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Check</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f5; }
.scr { display: none; }
.scr.on { display: flex; flex-direction: column; min-height: 100vh; }
.hdr { background: #fff; padding: 12px 16px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 10px; }
.hdr-back { width: 32px; height: 32px; border: none; background: #f5f5f5; border-radius: 8px; cursor: pointer; }
.hdr-title { flex: 1; font-weight: 500; }
.content { flex: 1; overflow-y: auto; padding: 16px; }
.btn { padding: 12px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; width: 100%; }
.btn-primary { background: #0F6E56; color: #fff; }
.btn-secondary { background: #534AB7; color: #fff; }
.btn-text { background: none; color: #0066cc; border: none; padding: 8px; font-size: 12px; }
.btn:disabled { background: #ddd; color: #999; cursor: not-allowed; }
.input { width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; margin-bottom: 8px; }
.card { background: #fff; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 8px; }
.checkbox-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; align-items: flex-start; }
.checkbox-item:last-child { border-bottom: none; }
.checkbox-item input { width: 20px; height: 20px; margin-top: 2px; }
.checkbox-item label { flex: 1; cursor: pointer; }
.note { font-size: 11px; color: #0F6E56; margin-top: 4px; }
.progress { width: 100%; height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden; margin: 8px 0; }
.progress-bar { height: 100%; background: #0F6E56; }
.tabs { display: flex; gap: 8px; margin-bottom: 12px; border-bottom: 1px solid #e0e0e0; }
.tab { padding: 8px 12px; border: none; background: none; cursor: pointer; font-size: 12px; color: #999; border-bottom: 2px solid transparent; }
.tab.on { color: #0F6E56; border-bottom-color: #0F6E56; }
.staff-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
.staff-item:last-child { border-bottom: none; }
.staff-del { background: #fee; color: #c33; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.warning { background: #fee; border: 1px solid #f7c1c1; border-radius: 8px; padding: 10px; color: #c33; font-size: 12px; margin-bottom: 12px; }
.badge { display: inline-block; background: #e1f5ee; color: #0F6E56; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; }
.cl-list { max-height: 300px; overflow-y: auto; }
.cl-item { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; align-items: center; font-size: 13px; }
.cl-item:last-child { border-bottom: none; }
.cl-check { color: #0F6E56; }
.cl-unchecked { color: #ccc; }
.cl-staff { font-size: 11px; color: #0F6E56; margin-top: 2px; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="scr on">
  <div class="hdr"><h1 class="hdr-title">Daily Check</h1></div>
  <div class="content">
    <div style="padding: 20px 0; text-align: center; margin-bottom: 16px;">
      <div style="font-size: 36px; margin-bottom: 10px;">📋</div>
      <h2 style="font-size: 20px;">Daily Check</h2>
    </div>
    
    <!-- STATS -->
    <div class="card" style="margin-bottom: 12px;">
      <div style="font-size: 11px; color: #999; margin-bottom: 8px; font-weight: 500;">本日の状況</div>
      <div id="home-stats" style="font-size: 13px; color: #666; line-height: 1.6;"></div>
    </div>

    <!-- CHECKLIST -->
    <div class="card" style="margin-bottom: 12px;">
      <div style="font-size: 11px; color: #999; margin-bottom: 8px; font-weight: 500;">CHECKLIST</div>
      <div class="tabs">
        <button class="tab on" onclick="switchTab('opening')">🌅 開店前</button>
        <button class="tab" onclick="switchTab('closing')">🌙 締め作業</button>
      </div>
      <div class="cl-list" id="cl-list"></div>
    </div>

    <!-- BUTTONS -->
    <button class="btn btn-primary" onclick="startMode('opening')" style="margin-bottom: 8px;">🌅 開店前チェック</button>
    <button class="btn btn-secondary" onclick="startMode('closing')" style="margin-bottom: 8px;">🌙 締め作業チェック</button>
    <button class="btn-text" onclick="showScr('staff-mgr')">👥 スタッフ管理</button>
  </div>
</div>

<!-- STAFF MANAGER -->
<div id="staff-mgr" class="scr">
  <div class="hdr">
    <button class="hdr-back" onclick="showScr('home')">←</button>
    <h1 class="hdr-title">スタッフ管理</h1>
  </div>
  <div class="content">
    <div style="margin-bottom: 16px;">
      <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">新規追加</label>
      <div style="display: flex; gap: 8px;">
        <input type="text" id="staff-add-input" class="input" placeholder="名前" style="flex: 1; margin-bottom: 0;">
        <button class="btn" style="flex: 0; background: #0F6E56; color: #fff; padding: 10px;" onclick="addStaff()">追加</button>
      </div>
    </div>
    <div style="font-size: 12px; color: #666; margin-bottom: 8px; font-weight: 500;">登録済みスタッフ</div>
    <div id="staff-list"></div>
  </div>
</div>

<!-- STAFF SELECT -->
<div id="staff" class="scr">
  <div class="hdr">
    <button class="hdr-back" onclick="showScr('home')">←</button>
    <h1 class="hdr-title" id="staff-title">記入者選択</h1>
  </div>
  <div class="content">
    <div id="staff-warn" class="warning" style="display: none;"></div>
    <div style="margin-bottom: 16px;">
      <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">スタッフ名</label>
      <input type="text" id="staff-input" class="input" placeholder="名前を入力">
      <div id="staff-err" style="color: #c33; font-size: 12px; display: none;">スタッフ名を入力してください</div>
    </div>
    <button class="btn btn-primary" onclick="toCheck()">チェック開始</button>
  </div>
</div>

<!-- CHECK -->
<div id="check" class="scr">
  <div class="hdr">
    <button class="hdr-back" onclick="showScr('staff')">←</button>
    <h1 class="hdr-title" id="check-title">チェック入力</h1>
  </div>
  <div class="content">
    <div style="margin-bottom: 12px;">
      <span id="check-staff" style="font-weight: 500;"></span> - 
      <span id="check-mode" style="color: #666;"></span>
    </div>
    <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
    <div style="font-size: 12px; color: #666; margin-bottom: 16px;"><span id="check-count"></span></div>
    <div id="check-items"></div>
  </div>
  <div style="padding: 12px; border-top: 1px solid #e0e0e0;">
    <button class="btn btn-primary" onclick="toConfirm()">確認へ</button>
  </div>
</div>

<!-- CONFIRM -->
<div id="confirm" class="scr">
  <div class="hdr">
    <button class="hdr-back" onclick="showScr('check')">←</button>
    <h1 class="hdr-title">確認</h1>
  </div>
  <div class="content">
    <div class="card">
      <div style="font-size: 12px; color: #666; margin-bottom: 4px;">記入者</div>
      <div style="font-weight: 500;" id="confirm-staff"></div>
    </div>
    <div class="card">
      <div style="font-size: 12px; color: #666; margin-bottom: 4px;">種別</div>
      <div style="font-weight: 500;" id="confirm-mode"></div>
    </div>
    <div class="card">
      <div style="font-size: 12px; color: #666; margin-bottom: 4px;">完了率</div>
      <div style="font-weight: 500;" id="confirm-rate"></div>
    </div>
  </div>
  <div style="padding: 12px; border-top: 1px solid #e0e0e0;">
    <button class="btn btn-primary" id="send-btn" onclick="send()">Notionに記録</button>
  </div>
</div>

<!-- DONE -->
<div id="done" class="scr">
  <div class="content" style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <div style="font-size: 48px; margin-bottom: 12px;">✅</div>
    <h2 style="font-size: 18px; margin-bottom: 8px;">記録しました</h2>
    <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Notionに送信されました</p>
    <button class="btn btn-primary" onclick="goHome()" style="max-width: 200px;">ホームに戻る</button>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbx30eMIQXRUAcyeoH85jygkN0oSBDhchPRYe5IkKwsR29oKsZXbR9jIPcUJ-Efdspt2/exec";
const STORAGE_KEY = "daily-check-staffs";

const ITEMS = {
  opening: [
    {id: "健康確認", label: "健康確認", detail: "体調・検温・傷の有無"},
    {id: "手洗い実施", label: "手洗い実施", detail: "石けん30秒以上＋消毒"},
    {id: "身だしなみ", label: "身だしなみ", detail: "ユニフォーム・髪・爪確認"},
    {id: "冷蔵庫温度確認", label: "冷蔵庫温度確認", detail: "2～7℃以内"},
    {id: "原材料受入確認", label: "原材料受入確認", detail: "外観・におい・期限確認"},
    {id: "交差汚染防止確認", label: "交差汚染防止確認", detail: "保管状態・まな板確認"},
    {id: "調理器具殺菌確認", label: "調理器具殺菌確認", detail: "漂白・洗浄消毒確認"},
    {id: "ガス電気点検", label: "ガス・電気点検", detail: "動作確認"},
    {id: "湯沸かし", label: "湯沸かし", detail: "お湯を沸かす"},
    {id: "作業場清掃消毒", label: "作業場清掃消毒", detail: "調理台・棚清掃"},
    {id: "ハイター済タオル干し", label: "ハイター済タオル干し", detail: "タオル準備"},
    {id: "仕込み在庫補充", label: "仕込み在庫補充", detail: "材料確認"},
    {id: "食洗機作動確認", label: "食洗機作動確認", detail: "動作確認"},
    {id: "ビールサーバー確認", label: "ビールサーバー確認", detail: "温度確認"},
    {id: "ドリンク在庫補充", label: "ドリンク在庫補充", detail: "在庫補充"},
    {id: "客席清掃消毒", label: "客席清掃消毒", detail: "テーブル・椅子清掃"},
    {id: "カトラリー補充", label: "カトラリー補充", detail: "補充確認"},
    {id: "消耗品補充", label: "消耗品補充", detail: "補充"},
    {id: "メニューブック消毒", label: "メニューブック消毒", detail: "消毒"},
    {id: "ソフトクリームサーバー確認", label: "ソフトクリーム確認", detail: "動作確認"},
    {id: "トイレ洗浄消毒", label: "トイレ洗浄消毒", detail: "消毒"},
    {id: "床清掃", label: "床清掃", detail: "モップがけ"},
    {id: "風除室清掃", label: "風除室清掃", detail: "清掃"},
  ],
  closing: [
    {id: "フライヤー締め", label: "フライヤー締め", detail: "電源OFF"},
    {id: "ガスコンロ洗浄", label: "ガスコンロ洗浄", detail: "清掃"},
    {id: "食洗機洗浄締め", label: "食洗機洗浄・締め", detail: "洗浄"},
    {id: "ガス栓電源換気扇確認", label: "ガス栓・電源・換気扇", detail: "確認"},
    {id: "冷蔵冷凍庫確認", label: "冷蔵・冷凍庫確認", detail: "確認"},
    {id: "調理器具食器洗浄", label: "調理器具・食器洗浄", detail: "洗浄"},
    {id: "調理器具サプライ", label: "調理器具サプライ", detail: "準備"},
    {id: "作業台清掃", label: "作業台清掃", detail: "清掃"},
    {id: "シンク清掃", label: "シンク清掃", detail: "清掃"},
    {id: "タオル類回収", label: "タオル類回収", detail: "回収"},
    {id: "タオルスポンジハイター殺菌", label: "タオル・スポンジ殺菌", detail: "殺菌"},
    {id: "翌日タオル準備", label: "翌日タオル準備", detail: "準備"},
    {id: "コバエ駆除剤セット", label: "コバエ駆除剤セット", detail: "セット"},
    {id: "ゴミ箱チェック", label: "ゴミ箱チェック", detail: "確認"},
  ]
};

let currentMode = null;
let currentTab = "opening";
let staff = "";
let checks = {};
let staffs = [];
let notionRecords = [];

function showScr(id) {
  document.querySelectorAll(".scr").forEach(s => s.classList.remove("on"));
  document.getElementById(id).classList.add("on");
}

function loadStaffs() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    staffs = saved ? JSON.parse(saved) : [];
  } catch (e) {
    staffs = [];
  }
  renderStaffList();
}

function saveStaffs() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(staffs));
}

function addStaff() {
  const inp = document.getElementById("staff-add-input");
  const name = inp.value.trim();
  if (!name) return;
  if (staffs.includes(name)) {
    alert("既に登録されています");
    return;
  }
  staffs.push(name);
  saveStaffs();
  inp.value = "";
  renderStaffList();
}

function delStaff(name) {
  staffs = staffs.filter(s => s !== name);
  saveStaffs();
  renderStaffList();
}

function renderStaffList() {
  const html = staffs.map(s => `
    <div class="staff-item">
      <span style="flex: 1;">${s}</span>
      <button class="staff-del" onclick="delStaff('${s}')">削除</button>
    </div>
  `).join("");
  document.getElementById("staff-list").innerHTML = html || "<div style='color: #999; font-size: 12px;'>登録済みスタッフなし</div>";
}

function switchTab(mode) {
  currentTab = mode;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("on"));
  event.target.classList.add("on");
  renderChecklist();
}

async function loadTodayRecords() {
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: {"Content-Type": "text/plain"},
      body: JSON.stringify({action: "fetchTodayRecords"})
    });
    const data = await res.json();
    if (data.ok && data.data) {
      notionRecords = [...(data.data.opening || []), ...(data.data.closing || [])];
      renderChecklist();
      renderStats();
    }
  } catch (err) {
    console.log("Load error:", err);
  }
}

function renderStats() {
  if (!notionRecords.length) {
    document.getElementById("home-stats").innerHTML = "<div style='color: #999;'>本日のチェック記録なし</div>";
    return;
  }
  const opening = notionRecords.filter(r => r.mode === "opening");
  const closing = notionRecords.filter(r => r.mode === "closing");
  document.getElementById("home-stats").innerHTML = `
    <div>🌅 開店前: ${opening.length}件</div>
    <div>🌙 締め作業: ${closing.length}件</div>
    <div style="margin-top: 4px;">計: ${notionRecords.length}件</div>
  `;
}

function renderChecklist() {
  const items = ITEMS[currentTab];
  const itemStatus = {};
  items.forEach(item => {
    itemStatus[item.id] = [];
  });
  
  notionRecords.forEach(rec => {
    if (rec.mode === currentTab && rec.checks?.items) {
      Object.keys(rec.checks.items).forEach(itemId => {
        if (rec.checks.items[itemId] && itemStatus[itemId]) {
          itemStatus[itemId].push(rec.staff);
        }
      });
    }
  });
  
  const html = items.map(item => {
    const checkers = itemStatus[item.id] || [];
    return `
      <div class="cl-item">
        <span class="${checkers.length > 0 ? 'cl-check' : 'cl-unchecked'}">${checkers.length > 0 ? '✅' : '○'}</span>
        <div style="flex: 1;">
          <div style="font-weight: 500;">${item.label}</div>
          ${checkers.length > 0 ? `<div class="cl-staff">${checkers.join(' / ')}</div>` : ''}
        </div>
      </div>
    `;
  }).join("");
  document.getElementById("cl-list").innerHTML = html;
}

function startMode(m) {
  currentMode = m;
  checks = {};
  staff = "";
  document.getElementById("staff-title").textContent = (m === "opening" ? "🌅 " : "🌙 ") + (m === "opening" ? "開店前" : "締め作業");
  document.getElementById("staff-input").value = "";
  document.getElementById("staff-err").style.display = "none";
  document.getElementById("staff-warn").style.display = "none";
  showScr("staff");
}

function toCheck() {
  const inp = document.getElementById("staff-input");
  const name = inp.value.trim();
  if (!name) {
    document.getElementById("staff-err").style.display = "block";
    return;
  }
  
  // 既にチェック済みかチェック
  const alreadyChecked = notionRecords.find(r => r.staff === name && r.mode === currentMode);
  if (alreadyChecked) {
    document.getElementById("staff-warn").innerHTML = `⚠️ <strong>${name}</strong>さんは既に${currentMode === "opening" ? "開店前" : "締め作業"}をチェック済みです。本当に記入しますか？`;
    document.getElementById("staff-warn").style.display = "block";
  }
  
  staff = name;
  document.getElementById("check-staff").textContent = staff;
  document.getElementById("check-mode").textContent = (currentMode === "opening" ? "開店前" : "締め作業");
  
  const items = ITEMS[currentMode];
  const html = items.map(item => {
    const alreadyDone = notionRecords.find(r => r.mode === currentMode && r.checks?.items?.[item.id]);
    return `
      <div class="checkbox-item">
        <input type="checkbox" id="${item.id}" onchange="updateProgress()">
        <label for="${item.id}">
          <div style="font-weight: 500; font-size: 14px;">${item.label}</div>
          <div style="font-size: 12px; color: #999;">${item.detail}</div>
          ${alreadyDone ? `<div class="note">✅ 既に記入済み</div>` : ''}
        </label>
      </div>
    `;
  }).join("");
  document.getElementById("check-items").innerHTML = html;
  updateProgress();
  showScr("check");
}

function updateProgress() {
  const items = ITEMS[currentMode];
  const checked = Array.from(document.querySelectorAll("#check-items input:checked")).length;
  const total = items.length;
  document.getElementById("progress-bar").style.width = (checked / total * 100) + "%";
  document.getElementById("check-count").textContent = checked + "/" + total;
  
  checks = {};
  document.querySelectorAll("#check-items input").forEach(el => {
    if (el.checked) checks[el.id] = true;
  });
}

function toConfirm() {
  const items = ITEMS[currentMode];
  const checked = Object.keys(checks).length;
  const total = items.length;
  const rate = Math.round(checked / total * 100);
  
  document.getElementById("confirm-staff").textContent = staff;
  document.getElementById("confirm-mode").textContent = (currentMode === "opening" ? "🌅 開店前" : "🌙 締め作業");
  document.getElementById("confirm-rate").textContent = checked + "/" + total + " (" + rate + "%)";
  
  showScr("confirm");
}

async function send() {
  document.getElementById("send-btn").disabled = true;
  document.getElementById("send-btn").textContent = "送信中...";
  
  const today = new Date().toISOString().split("T")[0];
  const payload = {
    mode: currentMode,
    date: today,
    staff: staff,
    status: "✅ 完了",
    checks: checks
  };
  
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: {"Content-Type": "text/plain"},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    
    if (data.ok) {
      showScr("done");
      await loadTodayRecords();
    } else {
      alert("エラー: " + data.error);
    }
  } catch (err) {
    alert("送信失敗: " + err.message);
  }
  
  document.getElementById("send-btn").disabled = false;
  document.getElementById("send-btn").textContent = "Notionに記録";
}

function goHome() {
  showScr("home");
  loadTodayRecords();
}

// 初期化
document.addEventListener("DOMContentLoaded", () => {
  loadStaffs();
  loadTodayRecords();
  setInterval(loadTodayRecords, 5000);
});
</script>
</body>
</html>
